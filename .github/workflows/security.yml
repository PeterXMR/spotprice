name: Security

# Three complementary gates on the Rust supply chain:
#   - cargo-deny:  license policy + duplicate/source bans (config: deny.toml)
#   - cargo-audit: RustSec advisory DB CVE check against core/Cargo.lock
#   - cargo-vet:   crowd-sourced audit attestations from Google/Mozilla/Embark
#                  vet stores, gating new transitive deps that no one we trust
#                  has audited. Skips until the maintainer runs `cargo vet
#                  init` and commits core/supply-chain/. See docs/CARGO-VET.md.
#
# Lives in a separate workflow from android.yml on purpose: faster signal,
# clearer required-check naming, and the schedule trigger doesn't need to
# drag a full Android build along for the ride.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly sweep: catches advisories filed against deps that haven't changed
  # in our Cargo.lock since the last commit. Monday 06:00 UTC is quiet hours
  # for most contributors and lines up with the start of the work week.
  schedule:
    - cron: '0 6 * * 1'

# Cancel superseded PR runs; keep main-branch and scheduled runs to completion
# so security history isn't gappy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  cargo-deny:
    name: cargo-deny (licenses, bans, sources, advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build (core workspace)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      # Prebuilt binary — same pattern as android.yml uses for cargo-ndk.
      # Avoids a 2+ minute source build every run.
      - name: Install cargo-deny (prebuilt)
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-deny

      - name: Run cargo-deny check
        run: cargo deny --manifest-path core/Cargo.toml check

  cargo-audit:
    name: cargo-audit (RustSec advisory DB)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # audit-check posts findings to the Checks tab; SARIF/issue creation
      # needs write on issues & checks. security-events is the GitHub Code
      # Scanning surface; harmless if the action doesn't emit SARIF.
      issues: write
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run cargo-audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: core

  cargo-vet:
    # cargo-vet complements cargo-audit. cargo-audit catches *known CVEs*;
    # cargo-vet catches *no-one-we-trust-has-looked* — i.e. a freshly added
    # transitive dep from an unknown maintainer that hasn't (yet) had a CVE
    # filed but should still get human eyes before it ships in our APK.
    #
    # Bootstrap state: until the maintainer runs `cargo vet init` and commits
    # `core/supply-chain/`, this job is a no-op that prints a notice. Once the
    # supply-chain dir exists, this job enforces. That way merging this
    # workflow doesn't break CI for a repo that hasn't been initialized yet,
    # and the enforcement turns on the moment the dir lands. See
    # docs/CARGO-VET.md for the one-time bootstrap procedure.
    name: cargo-vet (supply chain audits)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check for supply-chain/ bootstrap state
        id: bootstrap
        run: |
          if [ -f core/supply-chain/config.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notice — cargo-vet not yet bootstrapped
        if: steps.bootstrap.outputs.ready == 'false'
        run: |
          echo "::notice title=cargo-vet skipped::core/supply-chain/ does not exist yet. Run \`cargo vet init\` (see docs/CARGO-VET.md) and commit the resulting directory to enable enforcement. This job will start gating PRs automatically once that lands."

      - name: Set up Rust toolchain
        if: steps.bootstrap.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build (core workspace)
        if: steps.bootstrap.outputs.ready == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      - name: Install cargo-vet (prebuilt)
        if: steps.bootstrap.outputs.ready == 'true'
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-vet

      - name: Run cargo-vet check
        if: steps.bootstrap.outputs.ready == 'true'
        run: cargo vet --manifest-path core/Cargo.toml check
