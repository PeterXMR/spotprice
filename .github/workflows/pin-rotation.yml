name: TLS pin auto-rotation

# Automated counterpart to the pin-expiry watchdog (pin-expiry-check.yml).
#
# The watchdog only NAGS when a <pin-set expiration="..."> is within 30 days of
# its silent-disable date. This workflow does the actual refresh: it re-fetches
# every host's live TLS chain, recomputes the leaf + intermediate SPKI pins and
# the expiration date, and opens a PR the moment the live certs differ from
# what's pinned. Merging that PR (and cutting a release) is what keeps the
# watchdog from ever firing.
#
# It can only open a PR — never auto-merge — because a pin change must still be
# reviewed and verified on-device against a proxy (see docs/PIN-ROTATION.md).
#
# PREREQUISITE: repo Settings -> Actions -> General -> "Allow GitHub Actions to
# create and approve pull requests" must be enabled, or the `gh pr create` step
# fails with a 403. (The default GITHUB_TOKEN can push the branch regardless.)

on:
  schedule:
    # Daily 07:00 UTC. Far more frequent than the weekly watchdog so a freshly
    # rotated upstream cert is picked up within a day, maximising the window to
    # review + merge + release before the old pin's expiration. Offset from
    # security.yml (06:00) and the watchdog (Mon 09:00). No-op on days when
    # nothing changed, so daily is cheap.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      lead_days:
        description: 'Days before each leaf notAfter to set expiration'
        required: false
        default: '5'
      dry_run:
        description: 'Compute and log changes without opening a PR'
        type: boolean
        required: false
        default: false

# Serialise: never let a manual dispatch race the daily cron onto the same
# branch.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  rotate:
    name: Refresh TLS pins from live hosts
    runs-on: ubuntu-latest
    permissions:
      # Push the rotation branch.
      contents: write
      # Open the rotation PR.
      pull-requests: write
    env:
      BRANCH: automation/tls-pin-rotation
      LEAD_DAYS: ${{ github.event.inputs.lead_days || '5' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ubuntu-latest ships python3 and openssl; no setup step needed.
      - name: Re-fetch live certs and rewrite pins
        id: rotate
        run: |
          set -euo pipefail
          ARGS=(--lead-days "$LEAD_DAYS" --today "$(date -u +%F)")
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          # Tee the per-host summary so we can drop it into the PR body / log.
          python3 scripts/rotate_tls_pins.py "${ARGS[@]}" | tee /tmp/rotation.log

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Pins rotated::Live certs differ from pinned values; preparing a PR."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Pins current::No upstream rotation detected. Nothing to do."
          fi

      - name: Open or update rotation PR
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Stable branch -> one rolling PR, never a weekly pile-up. Re-running
          # force-pushes the latest rotation onto the same open PR.
          git checkout -B "$BRANCH"
          git add app/composeApp/src/androidMain/res/xml/network_security_config.xml docs/PIN-ROTATION.md
          git commit -m "chore(security): rotate TLS certificate pins

          Auto-generated by .github/workflows/pin-rotation.yml. Re-fetched the
          live chains and refreshed the leaf + intermediate SPKI pins and the
          pin-set expiration dates. Review the diff and verify on-device against
          a proxy before merging (docs/PIN-ROTATION.md)."
          git push -f origin "$BRANCH"

          {
            echo "Automated TLS pin rotation. The watchdog (pin-expiry-check.yml) only nags; this PR is the actual refresh."
            echo ""
            echo "## Per-host summary"
            echo ""
            echo '```'
            cat /tmp/rotation.log
            echo '```'
            echo ""
            echo "## Before merge"
            echo ""
            echo "1. Sanity-check the pin/expiration diff in \`network_security_config.xml\`."
            echo "2. Verify on a real device against a proxy (mitmproxy) — pinning must still **reject** the proxy cert (docs/PIN-ROTATION.md)."
            echo "3. Merge, then cut a release before the earliest \`expiration\` date."
            echo "4. Close any open \"TLS pins approaching expiry\" watchdog issue."
          } > /tmp/pr-body.md

          if [ "$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')" = "0" ]; then
            gh pr create \
              --head "$BRANCH" \
              --base "$BASE" \
              --title "chore(security): rotate TLS certificate pins" \
              --body-file /tmp/pr-body.md
          else
            echo "::notice title=PR updated::An open rotation PR already exists on $BRANCH; force-pushed the latest pins to it."
          fi
