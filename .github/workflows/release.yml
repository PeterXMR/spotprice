name: Release (signed)

# Tag-triggered signed release builds. Produces a minified, R8-shrunk,
# release-signed APK + AAB and attaches them to the GitHub Release.
#
# This workflow is intentionally separate from android.yml — that one keeps
# building the debug APK on every push/PR and on tags (its release-publish step
# remains the unsigned fallback). This one runs in parallel on tags only and
# only when the signing secrets are actually present, so a fresh fork or a repo
# whose maintainer hasn't generated a keystore yet doesn't get a red X on every
# tag push.
on:
  push:
    tags: ['v*']

# Same pattern as android.yml: never cancel an in-flight tag run, because each
# tag should produce exactly one set of release artifacts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  signed-release:
    name: Build signed release APK + AAB
    runs-on: ubuntu-latest
    # Guard: skip the entire job if the keystore secret isn't configured.
    # The org/repo owner enables signing by setting `RELEASE_SIGNING_ENABLED`
    # to "true" as a repository variable AND populating the four secrets
    # listed below. Until then, this job is a no-op.
    if: ${{ vars.RELEASE_SIGNING_ENABLED == 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Rust toolchain (+ Android targets)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Rust build (core workspace)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: core

      - name: Install cargo-ndk (prebuilt)
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-ndk

      - name: Set up Gradle (caches ~/.gradle)
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build Rust core for 4 Android ABIs
        working-directory: core/ffi
        run: |
          cargo ndk \
            -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 \
            -o ../../app/android/src/main/jniLibs \
            build --release

      # Decode the keystore from the base64-encoded secret into a workspace
      # file. We write it under $RUNNER_TEMP so the file path is absolute and
      # outside the checked-out tree (no risk of accidentally globbing it into
      # an artifact).
      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is empty even though RELEASE_SIGNING_ENABLED is true."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Assemble signed release APK + AAB
        working-directory: app
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease :composeApp:bundleRelease --no-daemon

      - name: Rename artifacts for release upload
        run: |
          cp app/composeApp/build/outputs/apk/release/composeApp-release.apk \
             SpotPrice-${{ github.ref_name }}.apk
          cp app/composeApp/build/outputs/bundle/release/composeApp-release.aab \
             SpotPrice-${{ github.ref_name }}.aab

      - name: Attach signed artifacts to the GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            SpotPrice-${{ github.ref_name }}.apk
            SpotPrice-${{ github.ref_name }}.aab
          # Same prerelease semantics as android.yml: a hyphen after the
          # version number → prerelease, plain semver → latest.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Shred the decoded keystore
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/release.jks" ]; then
            shred -u "$RUNNER_TEMP/release.jks" || rm -f "$RUNNER_TEMP/release.jks"
          fi
