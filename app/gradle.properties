org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.parallel=true

# AGP 8.7 / Gradle 8.11 don't yet support JDK 25/26 — use JDK 21.
# Override via `~/.gradle/gradle.properties` or env JAVA_HOME if needed.
org.gradle.java.home=/Library/Java/JavaVirtualMachines/temurin-21.jdk/Contents/Home

# Kotlin / Compose
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx2g

# Android
android.useAndroidX=true
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=false

# Compose Multiplatform
org.jetbrains.compose.experimental.uikit.enabled=false
